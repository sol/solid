name: arcade
copyright: (c) 2023 Simon Hengel
license: MIT

defaults: sol/solid@1fe7673

ghc-options: -Wall

dependencies:
  - solid-pp
  - haskell-base
  - containers
  - unix

source-dirs: src

executable:
  main: Arcade.main

tests:
  spec:
    build-tools: hspec-discover
    main: Spec.hs
    source-dirs:
      - test
    dependencies:
      - hspec == 2.*
      - QuickCheck
